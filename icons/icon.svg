<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="100" fill="#0a0a0a"/>
  <!-- Background glow -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#c8ff00" stroke-width="1" opacity="0.15"/>
  <!-- FORGE text -->
  <text x="256" y="300" font-family="Arial Black, sans-serif" font-size="130" font-weight="900"
        fill="#c8ff00" text-anchor="middle" letter-spacing="8">F</text>
  <!-- Lightning bolt accent -->
  <polygon points="290,120 250,240 275,240 220,370 310,220 280,220 320,120"
           fill="#c8ff00" opacity="0.9"/>
  <!-- Bottom line -->
  <rect x="80" y="390" width="352" height="3" rx="1.5" fill="#c8ff00" opacity="0.4"/>
</svg>
